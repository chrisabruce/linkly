<!DOCTYPE html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            {% block title %}
                {{ app_title }}
            {% endblock %}
            — {{ app_title }}
        </title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
        <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.0-RC.8/bundles/datastar.js"></script>
        <style>
    /* ── Design Tokens ─────────────────────────────────── */
    :root {
      --font-body: 'Manrope', system-ui, -apple-system, sans-serif;
      --font-mono: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;

      --bg-body: #080c16;
      --bg-surface: #0f1524;
      --bg-elevated: #161d32;
      --bg-input: #0b1020;
      --bg-hover: rgba(255, 255, 255, 0.035);

      --border-subtle: rgba(148, 163, 184, 0.06);
      --border-default: rgba(148, 163, 184, 0.1);
      --border-strong: rgba(148, 163, 184, 0.18);
      --border-focus: rgba(59, 130, 246, 0.5);

      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --accent-violet: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --accent-gradient-hover: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);

      --color-emerald: #10b981;
      --color-amber: #f59e0b;
      --color-rose: #f43f5e;
      --color-sky: #0ea5e9;

      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;

      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3), 0 0 0 1px var(--border-subtle);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border-default);

      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
    }

    /* ── Pico Dark Overrides ───────────────────────────── */
    [data-theme="dark"] {
      --pico-background-color: var(--bg-body);
      --pico-color: var(--text-primary);
      --pico-h1-color: var(--text-primary);
      --pico-h2-color: var(--text-primary);
      --pico-h3-color: var(--text-primary);
      --pico-h4-color: var(--text-primary);
      --pico-primary: var(--accent);
      --pico-primary-hover: var(--accent-hover);
      --pico-primary-background: var(--accent);
      --pico-primary-hover-background: var(--accent-hover);
      --pico-primary-focus: rgba(59, 130, 246, 0.25);
      --pico-muted-color: var(--text-muted);
      --pico-muted-border-color: var(--border-subtle);
      --pico-card-background-color: var(--bg-surface);
      --pico-card-border-color: var(--border-default);
      --pico-card-sectioning-background-color: var(--bg-elevated);
      --pico-border-radius: var(--radius-md);
      --pico-font-family: var(--font-body);
      --pico-font-family-monospace: var(--font-mono);
      --pico-form-element-background-color: var(--bg-input);
      --pico-form-element-border-color: var(--border-default);
      --pico-form-element-focus-color: var(--border-focus);
      --pico-form-element-active-border-color: var(--accent);
      --pico-table-border-color: var(--border-subtle);
      --pico-secondary: var(--text-secondary);
      --pico-secondary-hover: var(--text-primary);
      color-scheme: dark;
    }

    /* ── Scrollbar ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Selection ─────────────────────────────────────── */
    ::selection {
      background: rgba(59, 130, 246, 0.3);
      color: var(--text-primary);
    }

    /* ── Base & Layout ─────────────────────────────────── */
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg-body);
      background-image:
        radial-gradient(ellipse 80% 50% at 10% 0%, rgba(59, 130, 246, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(139, 92, 246, 0.04) 0%, transparent 60%);
      background-attachment: fixed;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent-gradient);
      z-index: 1000;
    }
    main.container {
      flex: 1;
      padding-top: 2rem;
      padding-bottom: 3rem;
    }

    /* ── Navigation ────────────────────────────────────── */
    nav.site-nav {
      background: rgba(15, 21, 36, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 0 var(--pico-spacing);
      border-bottom: 1px solid var(--border-subtle);
      position: sticky;
      top: 2px;
      z-index: 100;
    }
    nav.site-nav a,
    nav.site-nav strong {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--transition-fast);
    }
    nav.site-nav a:hover {
      color: var(--text-primary);
      text-decoration: none;
    }
    nav.site-nav .brand {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    nav.site-nav ul {
      margin: 0;
    }
    nav.site-nav li a {
      font-size: 0.9rem;
      font-weight: 500;
      position: relative;
    }
    nav.site-nav li a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      width: 0;
      height: 2px;
      background: var(--accent-gradient);
      border-radius: 1px;
      transition: width var(--transition-normal), left var(--transition-normal);
    }
    nav.site-nav li a:hover::after {
      width: 100%;
      left: 0;
    }

    /* ── Flash Messages ────────────────────────────────── */
    .flash {
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .flash.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
    }
    .flash.error {
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.2);
      color: #fda4af;
    }

    /* ── Auth Pages (login / register / change-password) ─ */
    .auth-page {
      max-width: 24rem;
      margin: 4rem auto;
    }
    .auth-page article {
      box-shadow: var(--shadow-lg);
      position: relative;
    }
    .auth-page article::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: calc(var(--radius-lg) + 1px);
      background: var(--accent-gradient);
      opacity: 0.12;
      z-index: -1;
      filter: blur(24px);
      pointer-events: none;
    }
    .auth-brand {
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-page .auth-footer {
      text-align: center;
      font-size: 0.85rem;
      margin-top: 1rem;
      color: var(--text-secondary);
    }
    .auth-page button[type="submit"] {
      width: 100%;
    }

    /* ── Page Toolbar ──────────────────────────────────── */
    .page-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .page-toolbar h2 {
      margin: 0;
    }

    /* ── Form Pages (profile / edit user) ──────────────── */
    .form-page {
      max-width: 32rem;
      margin: 2rem auto;
    }

    /* ── Section Titles ────────────────────────────────── */
    .section-title {
      margin-bottom: 1rem;
    }
    .section-subtitle {
      font-weight: 400;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* ── Back Links ────────────────────────────────────── */
    .back-link {
      margin-bottom: 0.25rem;
    }

    /* ── Link Header (analytics pages) ─────────────────── */
    .link-header {
      margin-bottom: 1.5rem;
    }
    .link-header h2 {
      margin-bottom: 0.25rem;
    }
    .link-header p {
      margin: 0;
    }
    .link-header .link-description {
      margin: 0.4rem 0 0 0;
      font-size: 0.88rem;
      color: var(--text-muted);
      font-style: italic;
    }
    .link-destination {
      color: var(--text-muted);
      font-size: 0.88rem;
      word-break: break-all;
    }

    /* ── Tables ────────────────────────────────────────── */
    .table-scroll {
      overflow-x: auto;
    }
    table th {
      white-space: nowrap;
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      font-weight: 700;
      color: var(--text-muted);
    }
    table tbody tr {
      transition: background var(--transition-fast);
    }
    table tbody tr:hover {
      background: var(--bg-hover);
    }
    td.url-cell {
      max-width: 26rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Badges ────────────────────────────────────────── */
    .badge {
      font-size: 0.72rem;
      padding: 0.2em 0.6em;
      border-radius: 999px;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .badge.active {
      background: rgba(16, 185, 129, 0.12);
      color: #6ee7b7;
    }
    .badge.inactive {
      background: rgba(148, 163, 184, 0.1);
      color: var(--text-muted);
    }
    .badge.info {
      background: rgba(14, 165, 233, 0.12);
      color: #7dd3fc;
    }

    /* ── Short Link Display ────────────────────────────── */
    .short-link {
      font-family: var(--font-mono);
      font-size: 0.88rem;
      color: var(--accent);
    }

    /* ── Stat Cards ────────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition-fast), transform var(--transition-fast);
    }
    .stat-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-2px);
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
    }
    .stat-card:nth-child(1)::before { background: var(--accent); }
    .stat-card:nth-child(2)::before { background: var(--accent-violet); }
    .stat-card:nth-child(3)::before { background: var(--color-emerald); }
    .stat-card:nth-child(4)::before { background: var(--color-amber); }
    .stat-card .stat-value {
      font-size: 2.25rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .stat-card:nth-child(1) .stat-value { color: var(--accent); }
    .stat-card:nth-child(2) .stat-value { color: var(--accent-violet); }
    .stat-card:nth-child(3) .stat-value { color: var(--color-emerald); }
    .stat-card:nth-child(4) .stat-value { color: var(--color-amber); }
    .stat-card .stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    /* ── Breakdown Cards ───────────────────────────────── */
    .breakdown-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(16rem, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    .breakdown-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      transition: border-color var(--transition-fast);
    }
    .breakdown-card:hover {
      border-color: var(--border-default);
    }
    .breakdown-card h4 {
      margin: 0 0 0.85rem 0;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      font-weight: 700;
    }
    .breakdown-card .bar-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
      font-size: 0.85rem;
    }
    .breakdown-card .bar-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-secondary);
    }
    .breakdown-card .bar-label a {
      text-decoration: none;
      color: inherit;
      transition: color var(--transition-fast);
    }
    .breakdown-card .bar-label a:hover {
      color: var(--text-primary);
    }
    .breakdown-card .bar-count {
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
      font-size: 0.8rem;
      white-space: nowrap;
      font-weight: 600;
    }
    .breakdown-card .bar-track {
      width: 100%;
      height: 4px;
      background: var(--border-subtle);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 0.7rem;
    }
    .breakdown-card .bar-fill {
      height: 100%;
      background: var(--accent-gradient);
      border-radius: 999px;
      transition: width 800ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ── Clicks Table ──────────────────────────────────── */
    .clicks-table td {
      font-size: 0.82rem;
      vertical-align: middle;
    }
    .clicks-table .ts {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      color: var(--text-muted);
    }
    .clicks-table .ip {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    /* ── Form Cards ────────────────────────────────────── */
    article.form-card {
      margin-bottom: 2rem;
      box-shadow: var(--shadow-md);
    }
    article.form-card form {
      margin-bottom: 0;
    }
    .form-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 0.75rem;
      align-items: end;
    }
    @media (max-width: 48rem) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
    .form-row label {
      margin-bottom: 0;
    }
    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    @media (max-width: 36rem) {
      .form-grid-2 {
        grid-template-columns: 1fr;
      }
    }
    .form-description {
      margin-top: 0.6rem;
    }
    .form-divider {
      border: none;
      border-top: 1px solid var(--border-subtle);
      margin: 1.5rem 0;
    }
    .form-section-title {
      margin-bottom: 0.75rem;
    }
    .form-section-note {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    .form-checks {
      display: flex;
      gap: 2rem;
      border: none;
      padding: 0;
      margin-bottom: 1rem;
    }
    .form-checks label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0;
    }
    .form-checks input[type="checkbox"] {
      margin-bottom: 0;
    }
    .optional-label {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 400;
    }
    .code-input-wrap {
      position: relative;
    }
    .code-input-wrap input {
      padding-right: 2.2rem;
    }
    .code-validation-indicator {
      position: absolute;
      right: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      pointer-events: none;
    }
    .create-user-form {
      margin-top: 1rem;
    }

    /* ── Buttons — gradient primary ────────────────────── */
    button[type="submit"]:not(.outline):not(.delete-btn),
    a[role="button"]:not(.outline):not(.delete-btn) {
      background-image: var(--accent-gradient);
      border-color: transparent;
      font-weight: 600;
      transition: all var(--transition-fast);
    }
    button[type="submit"]:not(.outline):not(.delete-btn):hover,
    a[role="button"]:not(.outline):not(.delete-btn):hover {
      background-image: var(--accent-gradient-hover);
      border-color: transparent;
    }
    button[type="submit"]:not(.outline):not(.delete-btn):active,
    a[role="button"]:not(.outline):not(.delete-btn):active {
      transform: scale(0.98);
    }

    /* ── Outline buttons ───────────────────────────────── */
    .outline,
    a[role="button"].outline {
      border-color: var(--border-strong);
      color: var(--text-secondary);
      background: transparent;
      transition: all var(--transition-fast);
    }
    .outline:hover,
    a[role="button"].outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(59, 130, 246, 0.05);
    }

    /* ── Delete Button ─────────────────────────────────── */
    .delete-btn {
      padding: 0.3em 0.7em;
      font-size: 0.8rem;
      background: transparent;
      border: 1px solid var(--color-rose);
      color: var(--color-rose);
      border-radius: var(--radius-sm);
      cursor: pointer;
      line-height: 1.4;
      transition: all var(--transition-fast);
    }
    .delete-btn:hover {
      background: rgba(244, 63, 94, 0.1);
      color: #fb7185;
      border-color: #fb7185;
    }

    /* ── Action Cells (tables) ─────────────────────────── */
    .actions-cell {
      white-space: nowrap;
    }
    .actions-cell form {
      display: inline;
    }
    .actions-cell a[role="button"],
    .actions-cell button.outline {
      font-size: 0.8rem;
      padding: 0.3em 0.7em;
      margin-right: 0.3rem;
      text-decoration: none;
    }

    /* ── Meta / Date Cells ─────────────────────────────── */
    .date-cell {
      white-space: nowrap;
      color: var(--text-muted);
      font-size: 0.82rem;
    }
    .click-count {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
    .template-name {
      text-transform: capitalize;
    }

    /* ── Empty States ──────────────────────────────────── */
    .empty-state {
      color: var(--text-muted);
      text-align: center;
      padding: 3rem 0;
    }
    .empty-state-inline {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ── Placeholder (null values in tables) ────────────── */
    .placeholder {
      color: var(--text-muted);
    }

    /* ── Meta / URL text ───────────────────────────────── */
    .meta-text {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-style: italic;
    }
    .url-text {
      color: var(--text-muted);
      font-size: 0.82rem;
    }
    .location-text {
      font-size: 0.82rem;
    }

    /* ── Input Focus Glow ──────────────────────────────── */
    [data-theme="dark"] :is(input, select, textarea):focus {
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
      border-color: var(--accent);
    }

    /* ── Details / Summary ─────────────────────────────── */
    details {
      margin-bottom: 2rem;
    }
    details summary[role="button"].outline {
      border-color: var(--border-strong);
      color: var(--text-secondary);
    }
    details summary[role="button"].outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Footer ────────────────────────────────────────── */
    footer.site-footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 1.5rem;
      border-top: 1px solid var(--border-subtle);
      letter-spacing: 0.02em;
    }

    /* ── Entrance Animations ───────────────────────────── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stat-card,
    .breakdown-card {
      animation: fadeSlideUp 400ms ease both;
    }
    .stat-card:nth-child(1) { animation-delay: 0ms; }
    .stat-card:nth-child(2) { animation-delay: 60ms; }
    .stat-card:nth-child(3) { animation-delay: 120ms; }
    .stat-card:nth-child(4) { animation-delay: 180ms; }
    .breakdown-card:nth-child(1) { animation-delay: 100ms; }
    .breakdown-card:nth-child(2) { animation-delay: 160ms; }
    .breakdown-card:nth-child(3) { animation-delay: 220ms; }
    .breakdown-card:nth-child(4) { animation-delay: 280ms; }
    .breakdown-card:nth-child(5) { animation-delay: 340ms; }

    /* ── Bio Form ──────────────────────────────────────── */
    .bio-section {
      margin-bottom: 1.5rem;
    }
    .bio-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .bio-section-header button {
      font-size: 0.85rem;
      padding: 0.3em 0.8em;
    }
    .form-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.75rem;
      align-items: end;
    }
    @media (max-width: 48rem) {
      .form-grid-3 {
        grid-template-columns: 1fr;
      }
    }
    .publish-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 0.5rem;
    }
    .input-with-button {
      display: flex;
      gap: 0.5rem;
      align-items: end;
    }
    .input-with-button input {
      flex: 1;
    }
    .input-with-button button {
      white-space: nowrap;
    }
    .bg-type-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.75rem;
      align-items: end;
    }
    .color-swatch {
      height: 2.5rem;
      padding: 0.2rem;
    }
    .link-row {
      display: grid;
      grid-template-columns: 1fr 2fr auto auto;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .link-row label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin: 0;
      white-space: nowrap;
    }
    .social-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .unsplash-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    .unsplash-thumb {
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16/10;
    }
    .unsplash-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bg-preview {
      margin-top: 0.75rem;
    }
    .bg-preview img {
      max-height: 120px;
      border-radius: 8px;
      object-fit: cover;
    }
    .custom-css-textarea {
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }
    .slug-hint {
      color: var(--text-muted);
    }
    .bio-submit {
      width: 100%;
    }

    /* ── Reduced Motion ────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
    </head>

                </ul>
                <ul>
                    {% block nav_extra %}
                        <li>
                            <a href="/admin/dashboard">Dashboard</a>
                        </li>

        if (msg && !confirm(msg)) e.preventDefault();
      });
