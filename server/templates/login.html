{% extends "base.html" %}
{% block title %}
    Login
{% endblock %}
{% block nav_extra %}{% endblock %}
{% block content %}
    <div class="auth-page">
        <article>
            <header>
                <hgroup>
                    <h2 class="auth-brand">{{ app_title }}</h2>
                    <p>Sign in to manage your links</p>
                </hgroup>
            </header>
            {% if let Some(err) = error %}
                <div class="flash error">{{ err }}</div>
            {% endif %}
            <form method="POST" action="/admin/login">
                <label for="email">
                    Email
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        autocomplete="email"
                        autofocus
                        required
                    />
                </label>
                <label for="password">
                    Password
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    />
                </label>
                <button type="submit">Sign in</button>
            </form>
            <p class="auth-footer">
                Don't have an account? <a href="/admin/register">Register</a>
            </p>
        </article>
    </div>
{% endblock %}
