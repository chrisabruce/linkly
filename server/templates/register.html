{% extends "base.html" %}
{% block title %}
    Register
{% endblock %}
{% block nav_extra %}{% endblock %}
{% block content %}
    <div style="max-width: 22rem; margin: 4rem auto;">
        <article>
            <header>
                <hgroup>
                    <h2>🔗 {{ app_title }}</h2>
                    <p>Create your account</p>
                </hgroup>
            </header>
            {% if let Some(err) = error %}
                <div class="flash error">{{ err }}</div>
            {% endif %}
            <form method="POST" action="/admin/register">
                <label for="email">
                    Email
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        autocomplete="email"
                        autofocus
                        required
                    />
                </label>
                <label for="display_name">
                    Display Name
                    <input
                        type="text"
                        id="display_name"
                        name="display_name"
                        placeholder="Your name"
                        autocomplete="name"
                        required
                    />
                </label>
                <label for="password">
                    Password
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="At least 8 characters"
                        autocomplete="new-password"
                        minlength="8"
                        required
                    />
                </label>
                <label for="password_confirm">
                    Confirm Password
                    <input
                        type="password"
                        id="password_confirm"
                        name="password_confirm"
                        placeholder="Re-enter your password"
                        autocomplete="new-password"
                        minlength="8"
                        required
                    />
                </label>
                <button type="submit" style="width:100%;">Register</button>
            </form>
            <p style="text-align:center; font-size:0.85rem; margin-top:1rem;">
                Already have an account? <a href="/admin/login">Sign in</a>
            </p>
        </article>
    </div>
{% endblock %}
